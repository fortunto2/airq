[package]
name = "airq"
version = "0.3.1"
edition = "2024"
description = "A command-line tool to check air quality (AQI, PM2.5, PM10) from Open-Meteo and Sensor.Community"
license = "MIT"
repository = "https://github.com/fortunto2/airq"
keywords = ["air-quality", "cli", "open-meteo", "sensor-community"]
categories = ["command-line-utilities"]

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.0", features = ["derive"] }
colored = "3.1.1"
futures = "0.3.32"
reqwest = { version = "0.13.2", features = ["json"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.50.0", features = ["full"] }
