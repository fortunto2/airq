name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system deps (webkit2gtk + xdo for Dioxus desktop)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Build CLI
        run: cargo build --release -p airq

      - name: Build Dashboard
        run: cargo build --release -p airq-dashboard

      - name: Test
        run: cargo test --workspace

      - name: Package
        run: |
          strip target/release/airq target/release/air-signal
          tar czf airq-linux-x86_64.tar.gz -C target/release airq
          tar czf air-signal-linux-x86_64.tar.gz -C target/release air-signal

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            airq-linux-x86_64.tar.gz
            air-signal-linux-x86_64.tar.gz

  build-macos:
    name: macOS (ARM + Intel)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build CLI (ARM)
        run: cargo build --release -p airq --target aarch64-apple-darwin

      - name: Build Dashboard (ARM)
        run: cargo build --release -p airq-dashboard --target aarch64-apple-darwin

      - name: Build CLI (Intel)
        run: cargo build --release -p airq --target x86_64-apple-darwin

      - name: Test
        run: cargo test --workspace

      - name: Package
        run: |
          # ARM
          strip target/aarch64-apple-darwin/release/airq target/aarch64-apple-darwin/release/air-signal
          tar czf airq-macos-aarch64.tar.gz -C target/aarch64-apple-darwin/release airq
          tar czf air-signal-macos-aarch64.tar.gz -C target/aarch64-apple-darwin/release air-signal
          # Intel
          strip target/x86_64-apple-darwin/release/airq
          tar czf airq-macos-x86_64.tar.gz -C target/x86_64-apple-darwin/release airq

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            airq-macos-aarch64.tar.gz
            air-signal-macos-aarch64.tar.gz
            airq-macos-x86_64.tar.gz

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p airq

      - name: Build Dashboard
        run: cargo build --release -p airq-dashboard

      - name: Test
        run: cargo test --workspace

      - name: Package
        run: |
          Compress-Archive -Path target/release/airq.exe -DestinationPath airq-windows-x86_64.zip
          Compress-Archive -Path target/release/air-signal.exe -DestinationPath air-signal-windows-x86_64.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            airq-windows-x86_64.zip
            air-signal-windows-x86_64.zip

  update-homebrew:
    name: Update Homebrew formula
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Update formula in homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          SHA=$(curl -sL "https://github.com/fortunto2/airq/archive/refs/tags/${VERSION}.tar.gz" | sha256sum | cut -d' ' -f1)

          FILE_SHA=$(curl -s -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/fortunto2/homebrew-tap/contents/Formula/airq.rb" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")

          FORMULA=$(cat <<RUBY
          class Airq < Formula
            desc "CLI air quality checker — any city, Open-Meteo + Sensor.Community"
            homepage "https://github.com/fortunto2/airq"
            url "https://github.com/fortunto2/airq/archive/refs/tags/${VERSION}.tar.gz"
            sha256 "${SHA}"
            license "MIT"

            depends_on "rust" => :build

            def install
              system "cargo", "install", "--root", prefix, "--path", "."
            end

            test do
              assert_match "airq", shell_output("#{bin}/airq --version")
            end
          end
          RUBY
          )

          CONTENT=$(echo "$FORMULA" | base64 -w0)

          curl -s -X PUT \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/fortunto2/homebrew-tap/contents/Formula/airq.rb" \
            -d "{\"message\":\"bump airq to ${VERSION}\",\"content\":\"${CONTENT}\",\"sha\":\"${FILE_SHA}\"}" \
            && echo "Formula updated to ${VERSION}"
